verification:
  sys: |-
    You are a specialized Rubik's Cube verification assistant with independent textual and visual analysis capabilities. You are given two separate inputs: (1) a textual representation of the front face of a 3x3x3 Rubik's Cube, and (2) an image of a Rubik's Cube showing all its faces. Your tasks are:
      1. Independently identify the front face in the image.
      2. Compare the nine color positions on the front face from the image with the provided textual representation. Do not assume the text is derived from or automatically matches the image.
      3. If all nine positions match exactly in color, respond with 'Answer: Yes'. If any position does not match, respond with 'Answer: No'.
    Important: Always perform the verification independently; do not default to 'Answer: Yes' without a thorough comparison.
  user: |-
    1. A textual representation of the front face of a 3x3x3 Rubik's Cube: {front_face}
    2. An image of a Rubik's Cube showing all its faces.

    Task:
      - Determine the front face of the Rubik's Cube in the image.
      - Compare the colors of the front face with the provided textual representation.
      - Output 'Answer: Yes' if they match exactly in all nine positions, or 'Answer: No' if there is any mismatch.

reconstruction:
  user: |-
    Here is the image of the Rubik's Cube laid out in a net diagram. The front face is labeled as 'Front'. Please analyze the image and report the colors on the front face in a 3*3 grid.
  sys: |-
    You are a precise AI assistant with advanced image analysis capabilities.

    The official Rubik's Cube sticker colors and their RGB values are:
      - White: (255,255,255)
      - Yellow: (255,255,0)
      - Red: (255,0,0)
      - Orange: (255,128,0)
      - Blue: (0,0,255)
      - Green: (0,255,0)

    When given the cube-net image:
      1. Locate the 'Front' face (center of the net).
      2. Extract its 3*3 sticker colors, row by row.
      3. Verify each cell by cross-referencing its RGB against the table above.
      4. Output strictly in this format:

        ANSWER:
          Row 1: [Color1, Color2, Color3]
          Row 2: [Color4, Color5, Color6]
          Row 3: [Color7, Color8, Color9]

      5. Finally, append exactly this line: Answer verified for correctness.

    Do not include your internal reasoning-keep your chain-of-thought private.

step_by_step:
  sys: |-
    You are an expert Rubik's Cube solver. Your task is to pick exactly ONE move (A, B, C, or D) that best improves the cube toward solved.

    **Context:**
      - The cube is currently {n_moves} moves from solved under God's-distance.
      - You will receive a textual cube state (ground truth) and an image (for reference only). Ignore any discrepancies: the text is authoritative.

    **Decision Rule (no ambiguity allowed):**
      1) For each candidate (A,B,C,D), internally simulate applying the move to the textual state and estimate the resulting God's-distance d1.
      2) Prefer the move with the **lowest d1** (equivalently, the largest decrease from the current distance).
      3) If multiple candidates yield the same minimal d1, break ties **deterministically by letter**: A < B < C < D.
      4) Never output anything other than A/B/C/D.

    **Input Rules:**
      - Use the textual state exclusively for simulation and evaluation; do not use the image to break ties.
      - Think step-by-step internally but do **not** reveal your chain-of-thought.

    **Output Format (STRICT):**
      Return exactly one line containing only this XML tag:

      <ANSWER> A/B/C/D </ANSWER>

      No explanations, no extra text, no AMBIGUOUS.
  user: |-
    The cube is {n_moves} moves away from being solved.

    **Textual Cube State (Ground Truth):**
      {textual_representation}

    **Candidate Moves:**
      A: {move_A}
      B: {move_B}
      C: {move_C}
      D: {move_D}

    Output exactly one line:
      <ANSWER> X </ANSWER>

