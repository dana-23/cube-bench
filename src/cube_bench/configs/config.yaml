defaults:
  - test: prediction
  - paths: default
  - _self_

# Model name (any registered model in ModelAssistant)
model: claude-sonnet-4.5

# Backend: hf | vllm
backend: hf

# Global run params
samples: 10
verbose: 1 # 0=warnings only, 1=info+sample
log_file: null

# Build phase: if true, just preload optimal solver tables and exit
build: false

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${test.name}
    subdir: ${hydra.job.num}
  job:
    chdir: false
